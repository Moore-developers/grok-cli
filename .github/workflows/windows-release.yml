name: Release Windows Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release Binary
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\grok-cli.exe dist\grok-cli.exe
          Compress-Archive -Path dist\grok-cli.exe -DestinationPath grok-cli-windows-x86_64-pc-windows-msvc.zip -Force
          $hash = Get-FileHash grok-cli-windows-x86_64-pc-windows-msvc.zip -Algorithm SHA256
          "$($hash.Hash.ToLower())  grok-cli-windows-x86_64-pc-windows-msvc.zip" | Out-File -Encoding ascii grok-cli-windows-x86_64-pc-windows-msvc.zip.sha256

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            grok-cli-windows-x86_64-pc-windows-msvc.zip
            grok-cli-windows-x86_64-pc-windows-msvc.zip.sha256
